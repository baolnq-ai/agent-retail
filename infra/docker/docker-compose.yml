services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: retail-agent-postgres
    environment:
      POSTGRES_USER: retail
      POSTGRES_PASSWORD: retail_password
      POSTGRES_DB: retail_agent
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retail -d retail_agent"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - retail_agent_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: retail-agent-redis
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - retail_agent_redis:/data

volumes:
  retail_agent_postgres:
  retail_agent_redis:
