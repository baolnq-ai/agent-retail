name: ${DOCKER_COMPOSE_PROJECT_NAME:-retail_agent_full}

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-retail}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-retail_password}
      POSTGRES_DB: ${POSTGRES_DB:-retail_agent}
    ports:
      - "${POSTGRES_PORT:-3132}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-retail} -d $${POSTGRES_DB:-retail_agent}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-3139}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:v1.12.6
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-3133}:6333"
      - "${QDRANT_GRPC_PORT:-3134}:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    image: ${DOCKER_IMAGE_REPO:-baonguyen3568/ai-agent-retail}:api-${IMAGE_TAG:-v0.1.0-20260528}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      NODE_ENV: production
      API_PORT: 6810
      PORT: 6810
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_URL: postgresql://${POSTGRES_USER:-retail}:${POSTGRES_PASSWORD:-retail_password}@postgres:5432/${POSTGRES_DB:-retail_agent}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      QDRANT_HOST: qdrant
      QDRANT_PORT_INTERNAL: 6333
      QDRANT_URL: http://qdrant:6333
      CHAT_MODEL_BASE_URL: ${CHAT_MODEL_BASE_URL:-https://replace-with-your-vllm-gateway.example.invalid}
      CHAT_MODEL_ID: ${CHAT_MODEL_ID:-google/gemma-4-E4B-it}
      EMBED_RERANK_BASE_URL: ${EMBED_RERANK_BASE_URL:-https://replace-with-your-embed-rerank-gateway.example.invalid}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://127.0.0.1:3100,http://localhost:3100,http://127.0.0.1:3120,http://localhost:3120}
      RUN_DB_PUSH: ${RUN_DB_PUSH:-1}
      RUN_DB_SEED: ${RUN_DB_SEED:-1}
      WAIT_TIMEOUT_MS: ${WAIT_TIMEOUT_MS:-90000}
    ports:
      - "${API_PORT:-3110}:6810"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:6810/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 20

  web:
    image: ${DOCKER_IMAGE_REPO:-baonguyen3568/ai-agent-retail}:web-${IMAGE_TAG:-v0.1.0-20260528}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 6800
      API_BASE_URL: http://api:6810
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://127.0.0.1:3120}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://127.0.0.1:3120}
    ports:
      - "${WEB_PORT:-3100}:6800"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:6800').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 20

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    ports:
      - "${NGINX_PORT:-3120}:80"
    command:
      - /bin/sh
      - -c
      - |
        cat >/etc/nginx/conf.d/default.conf <<'EOF'
        server {
          listen 80;
          server_name _;
          client_max_body_size 10m;

          proxy_http_version 1.1;
          proxy_set_header Host $$host;
          proxy_set_header X-Real-IP $$remote_addr;
          proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $$scheme;
          proxy_set_header Upgrade $$http_upgrade;
          proxy_set_header Connection "upgrade";

          location = /nginx-health {
            add_header Content-Type text/plain;
            return 200 "ok\n";
          }

          location = /health {
            proxy_pass http://api:6810/health;
          }

          location /api/v1/ {
            proxy_pass http://api:6810/api/v1/;
          }

          location /model-gateway/ {
            proxy_pass http://api:6810/model-gateway/;
          }

          location /_next/webpack-hmr {
            proxy_pass http://web:6800/_next/webpack-hmr;
          }

          location / {
            proxy_pass http://web:6800;
          }
        }
        EOF
        nginx -g 'daemon off;'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/nginx-health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
